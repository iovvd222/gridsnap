[package]
name = "gridsnap"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "gridsnap"
path = "src/main.rs"

[dependencies]

# TOML config
serde = { version = "1.0", features = ["derive"] }
toml = "0.9"

# Logging
log = "0.4"
env_logger = "0.11"

# Anyhow for ergonomic error handling
anyhow = "1"

[target.'cfg(windows)'.dependencies]
# Win32 API bindings (Windows only)
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Accessibility",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_System_Threading",
    "Win32_UI_HiDpi",
    "Win32_System_ProcessStatus",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_Shell",
    "Win32_Graphics_Dwm",
    "Win32_System_Registry",
    "Win32_Security",
] }
windows-core = "0.61"

[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"
cocoa = "0.24"
dispatch = "0.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[package.metadata.packager]
product-name = "GridSnap"
identifier = "com.iovvd222.gridsnap"
version = "0.2.0"
icons = ["assets/icon.png"]   # 256x256以上のPNG

[package.metadata.packager.windows]
# WiX で .msi を生成（WiX は自動ダウンロードされる）

[package.metadata.packager.macos]
minimum-system-version = "12.0"