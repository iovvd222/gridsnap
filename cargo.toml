[package]
name = "gridsnap"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "gridsnap"
path = "src/main.rs"

[dependencies]

# TOML config
serde = { version = "1.0", features = ["derive"] }
toml = "0.9"

# Logging
log = "0.4"
env_logger = "0.11"

# Anyhow for ergonomic error handling
anyhow = "1"

[target.'cfg(windows)'.dependencies]
# Win32 API bindings (Windows only)
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Accessibility",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_System_Threading",
    "Win32_UI_HiDpi",
    "Win32_System_ProcessStatus",
] }
windows-core = "0.61"

[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"
cocoa = "0.24"
dispatch = "0.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true